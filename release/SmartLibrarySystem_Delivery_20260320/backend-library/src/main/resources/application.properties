# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/library_management?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.open-in-view=false

# Server Configuration
server.port=${SERVER_PORT:8089}

# Security Configuration
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
security.jwt.secret=${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
security.jwt.expiration=${SECURITY_JWT_EXPIRATION:86400000}
security.password-reset.expiration-minutes=${SECURITY_PASSWORD_RESET_EXPIRATION_MINUTES:30}
app.security.redis-enabled=${APP_SECURITY_REDIS_ENABLED:false}
app.cache.redis-enabled=${APP_CACHE_REDIS_ENABLED:${APP_SECURITY_REDIS_ENABLED:false}}
app.cache.hot-keywords-ttl=${APP_CACHE_HOT_KEYWORDS_TTL:PT2M}
app.cache.dashboard-stats-ttl=${APP_CACHE_DASHBOARD_STATS_TTL:PT30S}
app.cache.dashboard-analytics-ttl=${APP_CACHE_DASHBOARD_ANALYTICS_TTL:PT45S}
app.frontend-base-url=${APP_FRONTEND_BASE_URL:http://localhost:3000}
app.security.cors-allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:${SPRING_MAIL_USERNAME:no-reply@library.local}}
app.ai.enabled=${APP_AI_ENABLED:false}
app.ai.provider=${APP_AI_PROVIDER:openai}
app.ai.openai.base-url=${APP_AI_OPENAI_BASE_URL:https://api.openai.com/v1}
app.ai.openai.api-key=${APP_AI_OPENAI_API_KEY:}
app.ai.openai.model=${APP_AI_OPENAI_MODEL:gpt-4.1-mini}
app.ai.openai.max-output-tokens=${APP_AI_OPENAI_MAX_OUTPUT_TOKENS:700}
app.ai.openai.system-prompt=${APP_AI_OPENAI_SYSTEM_PROMPT:你是高校图书馆的 AI 助手。请用简洁、专业、友好的中文回答。你可以帮助用户进行图书推荐、借阅与预约规则说明、馆内服务指引和学习建议。对于实时馆藏数量、具体副本状态、罚款金额、账号数据等无法确认的事实，不要编造，应明确提醒用户去馆藏目录、个人中心或咨询馆员进行核实。}

# Redis Configuration
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.timeout=${SPRING_DATA_REDIS_TIMEOUT:2s}

library.loan.max-renewals=${LIBRARY_LOAN_MAX_RENEWALS:2}

# Logging Configuration
logging.level.org.springframework.security=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:INFO}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_ORG_HIBERNATE_SQL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOGGING_LEVEL_ORG_HIBERNATE_BINDER:WARN}
logging.level.com.example.library=${LOGGING_LEVEL_COM_EXAMPLE_LIBRARY:INFO}

# Jackson Configuration
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=UTC

