version: '3.8'

services:
  # ─────────────────────────
  # MySQL 数据库
  # ─────────────────────────
  mysql:
    image: mysql:8.0
    container_name: library_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-library_management}
      MYSQL_USER: ${MYSQL_USER:-library_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-library_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend-library/create.sql:/docker-entrypoint-initdb.d/create.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - library_net

  # ─────────────────────────
  # Redis 缓存 / 安全存储
  # ─────────────────────────
  redis:
    image: redis:7-alpine
    container_name: library_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - library_net

  # ─────────────────────────
  # Spring Boot 后端
  # ─────────────────────────
  backend:
    build:
      context: ./backend-library
      dockerfile: Dockerfile
    container_name: library_backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8089
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-library_management}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      JPA_DDL_AUTO: validate
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      JWT_SECRET: ${JWT_SECRET:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      APP_FRONTEND_BASE_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      APP_SECURITY_REDIS_ENABLED: "true"
      APP_CACHE_REDIS_ENABLED: "true"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8089:8089"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - library_net

  # ─────────────────────────
  # Next.js 前端
  # ─────────────────────────
  frontend:
    build:
      context: ./front_library
      dockerfile: Dockerfile
    container_name: library_frontend
    restart: unless-stopped
    environment:
      # 在 Docker 网络内，前端通过服务名访问后端
      BACKEND_URL: http://backend:8089
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - library_net

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  library_net:
    driver: bridge
